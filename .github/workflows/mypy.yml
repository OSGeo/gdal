name: Python type checking (mypy)

on:
  pull_request:
  push:

jobs:
  mypy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install mypy
        run: |
          pip install mypy

      - name: Run mypy
        run: |
          mypy swig/python || true