# See https://developers.google.com/gemini-code-assist/docs/customize-repo-review
have_fun: false
memory_config:
  disabled: false
code_review:
  disable: false
  comment_severity_threshold: MEDIUM
  max_review_comments: -1
  pull_request_opened:
    help: false
    summary: false
    # Do not automatically trigger
    code_review: false
    include_drafts: true
ignore_patterns: []
